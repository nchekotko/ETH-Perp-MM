name: as_vanilla

data:
  trades_parquet: data/trades.parquet
  lob_parquet: data/lob.parquet
  train_ratio: 0.7

strategy:
  name: as_vanilla
  # γ tuned for this dataset's σ ≈ 3e-4/sec on prices ~0.011. With T_horizon=0
  # (infinite-horizon limit, dt = 1 sec) the AS half-spread is
  #     ½(γσ² + (2/γ)log(1+γ/k))
  # which at γ=200, k≈4e5 evaluates to ~1.2e-5, well inside the natural book
  # spread (~1e-4). Smaller γ ⇒ tighter quotes / less inventory aversion.
  gamma: 200.0
  order_size: 100.0
  max_inventory: 5000.0
  quote_refresh_min_interval_us: 100000  # 100 ms

calibration:
  sigma_sample_stride: 1
  intensity_n_bins: 20
  T_horizon_seconds: 0  # infinite-horizon limit; keeps dt constant at 1 s

execution:
  partial_fills: true
  fee_bps: 0.0

output:
  results_dir: results/v1
  sample_every_n_events: 100
